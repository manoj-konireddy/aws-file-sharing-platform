<!DOCTYPE html>
<html>

<head>

    <title>
        Login
    </title>

    <link
        rel="stylesheet"
        href="/static/style.css">

</head>

<body>

<div class="container">

    <div class="upload-card">

        <h1>
            Login
        </h1>

        <form
            action="/login"
            method="post">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <br><br>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <br><br>

            <button type="submit">

                Login

            </button>

        </form>

        <br>

        <a href="/register">

            Create New Account

        </a>

    </div>

</div>

<script src="/static/script.js"></script>

</body>

</html>
