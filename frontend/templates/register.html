<!DOCTYPE html>
<html>

<head>

    <title>
        Register
    </title>

    <link
        rel="stylesheet"
        href="/static/style.css">

</head>

<body>

<div class="container">

    <div class="upload-card">

        <h1>
            Create Account
        </h1>

        <form
            action="/register"
            method="post">

            <input
                type="text"
                name="name"
                placeholder="Full Name"
                required>

            <br><br>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <br><br>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <br><br>

            <button type="submit">

                Register

            </button>

        </form>

        <br>

        <a href="/login">

            Already have an account?

        </a>

    </div>

</div>

<script src="/static/script.js"></script>

</body>

</html>
